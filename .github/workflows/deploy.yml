name: Deploy MarsAI

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install rsync
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y rsync

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Validate production compose
        env:
          DB_NAME: marsai
          DB_USER: marsai_user
          DB_PASSWORD: ci-password
          DB_ROOT_PASSWORD: ci-root-password
          JWT_SECRET: ci-jwt-secret
          CORS_ORIGIN: https://marsai.example.com
          VITE_API_URL: https://marsai.example.com
        run: docker compose -f docker-compose.prod.yml config

      - name: Sync code to VPS
        run: |
          rsync -az --delete \
            --exclude='.git/' \
            --exclude='node_modules/' \
            --exclude='*/node_modules/' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='*/.env' \
            --exclude='*/.env.*' \
            --exclude='dist/' \
            --exclude='*/dist/' \
            --exclude='logs/' \
            --exclude='*/logs/' \
            --exclude='uploads/' \
            --exclude='*/uploads/' \
            --exclude='test-results/' \
            --exclude='*/test-results/' \
            --exclude='playwright-report/' \
            --exclude='*/playwright-report/' \
            -e "ssh -i ~/.ssh/id_ed25519" \
            ./ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/srv/apps/marsai/

      - name: Build and restart containers on VPS
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            set -e
            cd /srv/apps/marsai

            docker compose -f docker-compose.prod.yml build --no-cache
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f

            until docker inspect -f '{{.State.Running}}' nginx | grep -q true; do
              echo "Waiting for nginx..."
              sleep 2
            done

            docker exec nginx nginx -t
            docker exec nginx nginx -s reload
          EOF
