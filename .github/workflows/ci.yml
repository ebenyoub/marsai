name: MarsAI CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: marsai_frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: marsai_frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'http://localhost:3002' }}
        run: npm run build

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: marsai_backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: marsai_backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint backend
        run: npm run lint

      - name: Build backend
        run: npm run build

  docker:
    name: Docker Compose
    runs-on: ubuntu-latest
    needs:
      - frontend
      - backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate production compose
        env:
          DB_NAME: marsai
          DB_USER: marsai_user
          DB_PASSWORD: ci-password
          DB_ROOT_PASSWORD: ci-root-password
          JWT_SECRET: ci-jwt-secret
          CORS_ORIGIN: https://marsai.example.com
          VITE_API_URL: https://marsai.example.com
        run: docker compose -f docker-compose.prod.yml config

      - name: Build production images
        env:
          DB_NAME: marsai
          DB_USER: marsai_user
          DB_PASSWORD: ci-password
          DB_ROOT_PASSWORD: ci-root-password
          JWT_SECRET: ci-jwt-secret
          CORS_ORIGIN: https://marsai.example.com
          VITE_API_URL: https://marsai.example.com
        run: docker compose -f docker-compose.prod.yml build
